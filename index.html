<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* Gradient Background */
background: linear-gradient(135deg,#667eea,#764ba2);

}

/* Profile Card */

.card{

background:white;
width:320px;
padding:30px;
text-align:center;

/* Rounded corners */
border-radius:20px;

/* Shadow */
box-shadow:0 15px 40px rgba(0,0,0,0.2);

transition:0.3s;

}

/* Hover effect */

.card:hover{

transform:translateY(-10px);
box-shadow:0 25px 50px rgba(0,0,0,0.3);

}

/* Profile Image */

.profile-img{

width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:5px solid #667eea;
margin-bottom:15px;

}

/* Upload Button */

input[type="file"]{

margin-top:10px;

}

/* Name */

h2{

font-weight:600;
margin-bottom:5px;

}

/* Stream */

.stream{

color:#764ba2;
font-weight:500;
margin-bottom:10px;

}

/* Bio */

.bio{

font-size:14px;
color:#555;

}

</style>

</head>

<body>

<div class="card">

<img id="profileImage" src="https://via.placeholder.com/130" class="profile-img">

<h2>Hunaif Fawaz</h2>

<p class="stream">Computer Science Student</p>

<p class="bio">
Passionate about programming, web development and AI.
I enjoy building software and learning new technologies.
</p>

<br>

<input type="file" accept="image/*" onchange="loadImage(event)">

</div>

<script>

function loadImage(event){

var image=document.getElementById('profileImage');
image.src=URL.createObjectURL(event.target.files[0]);

}

</script>

</body>
</html>
