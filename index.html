<!DOCTYPE html>
<html>
<head>
<title>Student Profile Card</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:20px;
    width:300px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin-bottom:10px;
}

.card h2{
    margin:10px 0;
}

.card p{
    color:gray;
}

</style>

</head>

<body>

<div class="card">

<img src="https://via.placeholder.com/120" alt="Profile Image">

<h2>Hunaif Fawaz</h2>

<h4>Computer Science Student</h4>

<p>
Passionate about programming, web development, and technology.
Interested in learning AI and building useful software.
</p>

</div>

</body>
</html>
