<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunaif Fawaz - Student Profile</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.5s;
            padding: 20px;
        }

        .profile-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 320px;
            max-width: 100%;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .profile-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .profile-card img:hover {
            transform: scale(1.1);
        }

        .profile-card h2 {
            margin: 20px 0 10px 0;
            font-size: 24px;
            color: #333;
        }

        .profile-card h4 {
            margin: 0 0 15px 0;
            font-weight: 400;
            color: #777;
        }

        .profile-card p {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        .contact-icons {
            margin-top: 20px;
        }

        .contact-icons a {
            color: #555;
            margin: 0 12px;
            font-size: 22px;
            transition: transform 0.3s, color 0.3s;
        }

        .contact-icons a:hover {
            color: #6a11cb;
            transform: translateY(-5px) scale(1.2);
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .profile-card {
                padding: 20px;
            }

            .profile-card h2 {
                font-size: 20px;
            }

            .profile-card h4 {
                font-size: 16px;
            }

            .profile-card p {
                font-size: 13px;
            }

            .contact-icons a {
                font-size: 20px;
                margin: 0 8px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <img src="https://via.placeholder.com/120" alt="Hunaif Fawaz">
        <h2>Hunaif Fawaz</h2>
        <h4>Computer Science / ICT</h4>
        <p>Enthusiastic student passionate about programming, web development, and learning new technologies.</p>

        <div class="contact-icons">
            <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/947XXXXXXXX" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.linkedin.com/" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
    </div>
</body>
</html>
